<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <link rel="stylesheet" href="./input.css" />
    <!-- Fa icon link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <title>Product Details Page</title>
  </head>
  <body class="bg-white text-slate-900 dark:bg-black dark:text-slate-100">
    <header class="nav">
      <h1 class="text-xl font-semibold">Zenova</h1>
      <nav class="flex items-center space-x-12">
        <ul
          class="hidden md:flex items-center space-x-12 text-base font-semibold [&>li>a]:hover:text-gray-400"
        >
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
        <button class="btn text-base!">Log In</button>
      </nav>
    </header>

    <main>
      <section class="px-6 md:px-20">
        <div class="grid gap-36 lg:grid-cols-2 lg:items-start">
          <div
            class="overflow-hidden rounded-2xl bg-[#f6f3ee] shadow-[0_18px_50px_rgba(15,23,42,0.08)]"
          >
            <img
              src="./img/img1.jpg"
              alt="Product detail preview"
              class="h-153.25 w-full object-cover"
            />
          </div>

          <div class="flex flex-col justify-start py-0 lg:min-h-94 lg:pt-4">
            <div class="w-full space-y-5">
              <div class="space-y-3">
                <h2
                  class="text-3xl font-semibold tracking-tight text-slate-950 md:text-5xl"
                >
                  Product name
                </h2>
                <p class="text-[24px] text-slate-500 md:text-xl">Subheading</p>
              </div>

              <p class="text-lg font-medium text-slate-950 md:text-xl">
                $10.99
              </p>

              <p
                class="w-full text-sm leading-6 text-slate-500 md:text-base md:leading-7"
              >
                Body text for describing what this product is and why this
                product is simply a must-buy.
              </p>

              <button
                class="inline-flex w-full justify-center rounded-md bg-black px-6 py-3 text-sm font-medium text-white transition-colors duration-150 hover:bg-slate-800"
              >
                Add to cart
              </button>

              <p class="text-sm text-slate-400 md:text-base">
                Text box for additional details or fine print
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
