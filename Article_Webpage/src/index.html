<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <title>Article Webpage</title>
    <link rel="stylesheet" href="./input.css" />
    <!-- Fa icon link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body class="bg-white text-slate-900 dark:bg-black dark:text-slate-100">
    <!-- navbar -->
    <header class="nav">
      <h1 class="text-xl font-semibold">Zenova</h1>
      <nav class="flex items-center space-x-12">
        <ul
          class="hidden md:flex items-center space-x-12 text-base font-semibold [&>li>a]:hover:text-gray-400"
        >
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
        <button class="btn text-base!">Log In</button>
      </nav>
    </header>

    <!-- hero section -->
    <main class="mt-13">
      <section class="px-6 md:px-20 max-w-211">
        <h1 class="primaryh1">Modern UI for a Better Web</h1>
        <p
          class="text-base sm:text-lg md:text-2xl mt-6 text-slate-600 dark:text-slate-300"
        >
          Design modern, responsive interfaces with ease. Zenova helps you build
          clean, scalable layouts that users love.
        </p>
        <button
          class="btn px-6 py-3.5 text-sm md:text-2xl mt-6 md:px-8 md:py-5 md:mt-10"
        >
          Get started
        </button>
      </section>

      <!--  hero section with full images -->
      <section class="mt-19 px-6 md:px-20">
        <img
          class="w-full h-auto rounded-lg object-contain"
          src="./img/main_images.png"
          alt="main_image"
        />
      </section>
    </main>
  </body>
</html>
